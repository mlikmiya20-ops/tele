# TELECLOUD-MULTI Android Build - Fixed
name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  QT_VERSION: '6.5.3'
  NDK_VERSION: '25.2.9519653'
  SDK_BUILD_TOOLS: '34.0.0'
  SDK_PLATFORM: 'android-34'

jobs:
  build-android:
    name: Build Android arm64
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install "build-tools;${{ env.SDK_BUILD_TOOLS }}" "platforms;${{ env.SDK_PLATFORM }}" "ndk;${{ env.NDK_VERSION }}"

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt for Desktop
        run: python -m aqt install-qt linux desktop ${{ env.QT_VERSION }} gcc_64 --outputdir /home/runner/Qt

      - name: Install Qt for Android
        run: python -m aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a --outputdir /home/runner/Qt

      - name: Cache FFmpeg
        uses: actions/cache@v4
        id: cache-ffmpeg
        with:
          path: /home/runner/ffmpeg-android
          key: ffmpeg-android-arm64-v12

      - name: Download FFmpeg for Android
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p /home/runner/ffmpeg-android
          cd /home/runner/ffmpeg-android
          
          wget -q --timeout=60 "https://github.com/arthenica/ffmpeg-kit/releases/download/v6.0.2/ffmpeg-kit-full-arm64.zip" -O ffmpeg.zip || true
          
          if [ -f ffmpeg.zip ] && [ -s ffmpeg.zip ]; then
            echo "FFmpeg downloaded, extracting..."
            unzip -q ffmpeg.zip || true
            rm -f ffmpeg.zip
            mkdir -p lib include
            if [ -d "ffmpeg-kit-full-arm64" ]; then
              cp -r ffmpeg-kit-full-arm64/lib/* lib/ 2>/dev/null || true
              cp -r ffmpeg-kit-full-arm64/include/* include/ 2>/dev/null || true
              rm -rf ffmpeg-kit-full-arm64
            fi
          else
            echo "FFmpeg download failed, creating stub headers..."
            rm -f ffmpeg.zip
            mkdir -p lib include/libavcodec include/libavformat include/libavutil
            printf '#ifndef AVCODEC_H\n#define AVCODEC_H\n#endif\n' > include/libavcodec/avcodec.h
            printf '#ifndef AVFORMAT_H\n#define AVFORMAT_H\n#endif\n' > include/libavformat/avformat.h
            printf '#ifndef AVUTIL_H\n#define AVUTIL_H\n#endif\n' > include/libavutil/avutil.h
          fi

      - name: Configure CMake (Console)
        run: |
          mkdir build && cd build
          
          QT_ANDROID_PATH=/home/runner/Qt/${{ env.QT_VERSION }}/android_arm64_v8a
          QT_HOST_PATH=/home/runner/Qt/${{ env.QT_VERSION }}/gcc_64
          
          echo "QT_ANDROID_PATH=$QT_ANDROID_PATH"
          echo "QT_HOST_PATH=$QT_HOST_PATH"
          ls -la $QT_ANDROID_PATH/lib/cmake/Qt6/ | head -5
          
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_PREFIX_PATH=$QT_ANDROID_PATH \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DFFMPEG_ROOT=/home/runner/ffmpeg-android \
            -DENABLE_GUI=OFF

      - name: Build
        run: |
          cd build
          cmake --build . -j$(nproc)
          
          echo "=== Build Artifacts ==="
          find . -name "telecloud-multi" -o -name "*.so" 2>/dev/null

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: |
            build/src/telecloud-multi
            build/**/*.so
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            build/CMakeCache.txt
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: android-*
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
