# TELECLOUD-MULTI Android Build - With APK generation
name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  QT_VERSION: '6.5.3'
  NDK_VERSION: '25.2.9519653'
  SDK_BUILD_TOOLS: '34.0.0'
  SDK_PLATFORM: 'android-34'

jobs:
  build-android:
    name: Build Android arm64
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install "build-tools;${{ env.SDK_BUILD_TOOLS }}" "platforms;${{ env.SDK_PLATFORM }}" "ndk;${{ env.NDK_VERSION }}"

      - name: Cache Qt
        uses: actions/cache@v4
        id: cache-qt
        with:
          path: /home/runner/Qt
          key: qt-${{ env.QT_VERSION }}-android-full-v1

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt for Desktop
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          python -m aqt install-qt linux desktop ${{ env.QT_VERSION }} gcc_64 \
            --outputdir /home/runner/Qt \
            --modules qtshadertools

      - name: Install Qt for Android
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          python -m aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir /home/runner/Qt \
            --modules qtshadertools

      - name: Cache FFmpeg
        uses: actions/cache@v4
        id: cache-ffmpeg
        with:
          path: /home/runner/ffmpeg-android
          key: ffmpeg-android-arm64-v10

      - name: Download FFmpeg for Android
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p /home/runner/ffmpeg-android
          cd /home/runner/ffmpeg-android
          
          wget -q --timeout=60 "https://github.com/arthenica/ffmpeg-kit/releases/download/v6.0.2/ffmpeg-kit-full-arm64.zip" -O ffmpeg.zip || true
          
          if [ -f ffmpeg.zip ] && [ -s ffmpeg.zip ]; then
            echo "FFmpeg downloaded, extracting..."
            unzip -q ffmpeg.zip || true
            rm -f ffmpeg.zip
            mkdir -p lib include
            if [ -d "ffmpeg-kit-full-arm64" ]; then
              cp -r ffmpeg-kit-full-arm64/lib/* lib/ 2>/dev/null || true
              cp -r ffmpeg-kit-full-arm64/include/* include/ 2>/dev/null || true
              rm -rf ffmpeg-kit-full-arm64
            fi
          else
            echo "FFmpeg download failed, creating stub headers..."
            rm -f ffmpeg.zip
            mkdir -p lib include/libavcodec include/libavformat include/libavutil include/libswscale include/libswresample
            printf '#ifndef AVCODEC_H\n#define AVCODEC_H\n#endif\n' > include/libavcodec/avcodec.h
            printf '#ifndef AVFORMAT_H\n#define AVFORMAT_H\n#endif\n' > include/libavformat/avformat.h
            printf '#ifndef AVUTIL_H\n#define AVUTIL_H\n#endif\n' > include/libavutil/avutil.h
          fi

      - name: Setup Environment
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          
          QT_ANDROID_PATH=/home/runner/Qt/${{ env.QT_VERSION }}/android_arm64_v8a
          QT_HOST_PATH=/home/runner/Qt/${{ env.QT_VERSION }}/gcc_64
          echo "Qt6_DIR=$QT_ANDROID_PATH/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "Qt6Core_DIR=$QT_ANDROID_PATH/lib/cmake/Qt6Core" >> $GITHUB_ENV
          echo "QT_ANDROID_PATH=$QT_ANDROID_PATH" >> $GITHUB_ENV
          echo "QT_HOST_PATH=$QT_HOST_PATH" >> $GITHUB_ENV
          echo "FFMPEG_ROOT=/home/runner/ffmpeg-android" >> $GITHUB_ENV
          
          echo "$QT_ANDROID_PATH/bin" >> $GITHUB_PATH
          echo "$QT_HOST_PATH/bin" >> $GITHUB_PATH
          
          # Verify Qt installation
          echo "=== Qt Installation ==="
          ls -la /home/runner/Qt/${{ env.QT_VERSION }}/android_arm64_v8a/lib/cmake/ | head -20
          echo "=== Qt6Core ==="
          ls -la /home/runner/Qt/${{ env.QT_VERSION }}/android_arm64_v8a/lib/cmake/Qt6Core/ 2>/dev/null || echo "Qt6Core not found"

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DQt6_DIR=$Qt6_DIR \
            -DQt6Core_DIR=$Qt6Core_DIR \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DFFMPEG_ROOT=$FFMPEG_ROOT

      - name: Build
        run: |
          cd build
          cmake --build . -j$(nproc)

      - name: Create APK
        run: |
          cd build
          
          # Check if deployment settings file exists
          if ls android_*-deployment-settings.json 1>/dev/null 2>&1; then
            SETTINGS_FILE=$(ls android_*-deployment-settings.json | head -1)
            echo "Found deployment settings: $SETTINGS_FILE"
            
            # Run androiddeployqt
            $QT_HOST_PATH/bin/androiddeployqt \
              --input $SETTINGS_FILE \
              --output android-build \
              --android-platform $SDK_PLATFORM \
              --gradle \
              --release
              
            echo "=== APK Files ==="
            find . -name "*.apk" -type f
          else
            echo "No deployment settings file found, listing build artifacts..."
            find . -name "*.so" -o -name "telecloud-multi" 2>/dev/null
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: |
            build/**/*.apk
            build/**/*.aab
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            build/CMakeCache.txt
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: android-*
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
