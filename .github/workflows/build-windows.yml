# TELECLOUD-MULTI Windows Build - FIXED v3
name: Build Windows EXE

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  QT_VERSION: '6.5.3'

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Qt
        uses: actions/cache@v4
        id: cache-qt
        with:
          path: C:\Qt
          key: qt-${{ env.QT_VERSION }}-win64-v8

      - name: Install Qt
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_msvc2019_64 --outputdir C:\Qt\Qt

      - name: Cache FFmpeg
        uses: actions/cache@v4
        id: cache-ffmpeg
        with:
          path: C:\ffmpeg
          key: ffmpeg-win64-gpl-shared-v8

      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir C:\ffmpeg -Force
          cd C:\ffmpeg
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile ffmpeg.zip
          if (Test-Path ffmpeg.zip) {
            Expand-Archive -Path ffmpeg.zip -DestinationPath . -Force
            $extracted = Get-ChildItem -Directory -Filter "ffmpeg*" | Select-Object -First 1
            if ($extracted) {
              Move-Item "$($extracted.Name)\bin" bin -Force
              Move-Item "$($extracted.Name)\lib" lib -Force
              Move-Item "$($extracted.Name)\include" include -Force
              Remove-Item $extracted.FullName -Recurse -Force
            }
          }
          Remove-Item ffmpeg.zip -Force -ErrorAction SilentlyContinue

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: |
          mkdir build -Force
          cd build
          $QT_PATH = "C:\Qt\Qt\${{ env.QT_VERSION }}\msvc2019_64"
          if (-not (Test-Path $QT_PATH)) {
            $QT_PATH = (Get-ChildItem -Path "C:\Qt" -Filter "msvc2019_64" -Directory -Recurse | Select-Object -First 1).FullName
          }
          Write-Host "Using Qt at: $QT_PATH"
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_PATH" -DFFMPEG_ROOT="C:\ffmpeg" -DENABLE_GUI=ON

      - name: Build
        id: build
        run: |
          cd build
          cmake --build . --config Release --parallel $env:NUMBER_OF_PROCESSORS
          
          # Create Release directory
          mkdir Release -Force
          
          # The exe is in build\src\Release\ because of add_subdirectory(src)
          $exePath = "src\Release\telecloud-multi.exe"
          if (Test-Path $exePath) {
            Write-Host "Build successful! EXE at: $exePath"
            Copy-Item $exePath "Release\" -Force
            Copy-Item "src\Release\*.dll" "Release\" -Force -ErrorAction SilentlyContinue
            echo "build_success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Build output not found at $exePath"
            dir src\Release -ErrorAction SilentlyContinue
            echo "build_success=false" >> $env:GITHUB_OUTPUT
          }

      - name: Deploy Qt Dependencies
        if: steps.build.outputs.build_success == 'true'
        run: |
          cd build\Release
          
          # Copy FFmpeg DLLs
          if (Test-Path "C:\ffmpeg\bin") {
            Copy-Item "C:\ffmpeg\bin\*.dll" . -Force
          }
          
          # Find and run windeployqt with Qt Quick support
          $QT_PATH = "C:\Qt\Qt\${{ env.QT_VERSION }}\msvc2019_64"
          $DEPLOYQT = Join-Path $QT_PATH "bin\windeployqt.exe"
          if (-not (Test-Path $DEPLOYQT)) {
            $DEPLOYQT = (Get-ChildItem -Path "C:\Qt" -Filter "windeployqt.exe" -File -Recurse | Select-Object -First 1).FullName
          }
          if (Test-Path $DEPLOYQT) {
            Write-Host "Running windeployqt from: $DEPLOYQT"
            # CRITICAL: --quick flag is required for Qt Quick/QML applications!
            # Without it, QML runtime is not deployed and GUI won't show
            & "$DEPLOYQT" --release --quick --no-translations --no-system-d3d-compiler telecloud-multi.exe
            Write-Host "Qt Quick dependencies deployed successfully"
          }

      - name: Create Package
        if: steps.build.outputs.build_success == 'true'
        run: |
          mkdir dist -Force
          Copy-Item "build\Release\telecloud-multi.exe" dist\ -Force
          Copy-Item "build\Release\*.dll" dist\ -Force -ErrorAction SilentlyContinue
          Copy-Item "Icon.png" dist\ -ErrorAction SilentlyContinue
          Copy-Item "README.md" dist\ -ErrorAction SilentlyContinue
          
          if (Test-Path "dist\telecloud-multi.exe") {
            Compress-Archive -Path dist\* -DestinationPath telecloud-multi-windows-x64.zip -Force
            Write-Host "Package created: telecloud-multi-windows-x64.zip"
            Get-ChildItem dist
          }

      - name: Upload Artifact
        if: steps.build.outputs.build_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: telecloud-multi-windows-x64.zip
          retention-days: 30

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: build/CMakeCache.txt
          retention-days: 7
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
